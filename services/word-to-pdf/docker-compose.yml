services:
  word-to-pdf:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      TEMP_ROOT: /tmp/pdf-palette
      CORS_ORIGIN: http://localhost:8080
    volumes:
      - conversion-temp:/tmp/pdf-palette

volumes:
  conversion-temp:
